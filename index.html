<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM1 FLAME TOOL</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { border: 2px solid #00aaff; padding: 20px; border-radius: 10px; max-width: 350px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; }
        button { width: 95%; padding: 12px; background: #00aaff; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #dashboard { display: none; }
        .status { margin-top: 15px; color: #ff8800; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <h2>CPM1 FLAME TOOL</h2>
    <input type="email" id="email" placeholder="Game Email">
    <input type="password" id="pass" placeholder="Game Password">
    <button onclick="login()">LOGIN TO SERVER</button>
</div>

<div class="container" id="dashboard">
    <h2>CPM1 DASHBOARD</h2>
    <button onclick="applyMod('money')">💰 ADD 1M CASH & COINS</button>
    <button onclick="applyMod('items')">🏎️ UNLOCK ITEMS (HORN/SMOKE/ENGINE)</button>
    <p id="status" class="status"></p>
    <button onclick="location.reload()" style="background: #ff3333; color: #fff;">LOGOUT</button>
</div>

<script>
    // CPM1 Firebase Key
    const API_KEY = 'AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM';
    // CPM1 Cloud Function URL
    const FUNCTION_URL = 'https://us-central1-cp-multiplayer.cloudfunctions.net/SetUserRating4';

    let userToken = "";

    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        
        try {
            const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`, {
                method: 'POST', body: JSON.stringify({ email, password: pass, returnSecureToken: true }), headers: {'Content-Type': 'application/json'}
            });
            const data = await res.json();
            if (data.idToken) {
                userToken = data.idToken;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert("Login Failed: " + (data.error ? data.error.message : "Invalid Credentials"));
            }
        } catch(e) { alert("Error connecting to server"); }
    }

    async function applyMod(type) {
        const status = document.getElementById('status');
        status.innerText = "Processing...";

        let payload = {};
        if (type === 'money') {
            payload = { data: { RatingData: { money: 1000000, coins: 1000000 } } };
        } else {
            payload = { data: { RatingData: { horns: true, smoke: true, engine: 1600, houses: true } } };
        }

        try {
            const res = await fetch(FUNCTION_URL, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + userToken, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            status.innerText = "Success! Reload game to see changes.";
        } catch(e) { status.innerText = "Error: Server might be blocking requests."; }
    }
</script>
</body>
</html>
